<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사주 조회 — 만세력</title>
<style>
  :root{
    --bg:#f4efe6; --panel:#fffdf8; --ink:#2b2420; --sub:#7a6f63; --line:#e3d9c7;
    --accent:#8a1c1c; --accent2:#b8860b;
    --mok:#2e7d4f; --hwa:#c0392b; --to:#b8860b; --geum:#8896a6; --su:#2b3a55;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Malgun Gothic","맑은 고딕",system-ui,sans-serif;line-height:1.5;padding:16px}
  .wrap{max-width:860px;margin:0 auto}
  h1{font-size:1.5rem;margin:.2em 0;letter-spacing:.05em}
  h1 small{color:var(--sub);font-size:.7rem;font-weight:normal;letter-spacing:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:18px;margin:14px 0;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .form{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
  .field{display:flex;flex-direction:column;gap:4px}
  .field label{font-size:.78rem;color:var(--sub)}
  input,select{font-size:1rem;padding:8px 10px;border:1px solid var(--line);border-radius:8px;
    background:#fff;color:var(--ink)}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:8px 14px;cursor:pointer;font-size:.95rem;color:var(--sub)}
  .seg button.on{background:var(--accent);color:#fff}
  .go{background:var(--accent);color:#fff;border:0;border-radius:8px;padding:10px 22px;
    font-size:1rem;cursor:pointer;letter-spacing:.1em}
  .go:hover{background:#701414}
  .chk{display:flex;align-items:center;gap:6px;font-size:.85rem;color:var(--sub)}
  .meta{display:flex;flex-wrap:wrap;gap:8px 20px;color:var(--sub);font-size:.9rem;margin:2px 0 10px}
  .meta b{color:var(--ink)}
  /* 사주 표 */
  .pillars{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;text-align:center}
  .col h3{margin:0 0 6px;font-size:.85rem;color:var(--sub);font-weight:600}
  .ten{font-size:.8rem;color:var(--accent);min-height:1.1em}
  .glyph{font-size:2.4rem;font-weight:700;line-height:1.15;border-radius:10px;padding:6px 0;margin:3px 0}
  .kor{font-size:.9rem;color:var(--sub)}
  .el-목{color:var(--mok)} .el-화{color:var(--hwa)} .el-토{color:var(--to)}
  .el-금{color:var(--geum)} .el-수{color:var(--su)}
  .bg-목{background:#e8f3ec} .bg-화{background:#fbe9e7} .bg-토{background:#f7f0dd}
  .bg-금{background:#eef1f5} .bg-수{background:#e9edf4}
  .us{font-size:.78rem;font-weight:600;color:var(--accent2);margin-top:3px}
  .glyph.gongmang{outline:2px dashed var(--accent);outline-offset:-4px;opacity:.8}
  .gm-tag{color:#fff;background:var(--accent);border-radius:4px;padding:0 5px;font-size:.66rem;margin-left:3px;vertical-align:middle}
  .tool{background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 14px;
    cursor:pointer;font-size:.92rem;color:var(--ink)}
  .tool:hover{background:#f2ece0}
  @media print{
    body{background:#fff;padding:0}
    .no-print{display:none!important}
    .card{box-shadow:none;border:1px solid #ccc;break-inside:avoid}
    h1 small{display:none}
  }
  .jjg{margin-top:8px;border-top:1px dashed var(--line);padding-top:5px;
    font-size:.74rem;color:var(--sub);line-height:1.4}
  .jjg-h{font-size:.68rem;color:#a99;letter-spacing:.05em;margin-bottom:2px}
  .jjg-t{color:var(--accent)}
  .ohaeng{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  .ohaeng .o{flex:1;min-width:64px;text-align:center;border:1px solid var(--line);border-radius:8px;padding:6px}
  .ohaeng .o .n{font-size:1.3rem;font-weight:700}
  table{border-collapse:collapse;width:100%;font-size:.9rem}
  th,td{border:1px solid var(--line);padding:7px 9px;text-align:center}
  th{background:#faf6ee;color:var(--sub);font-weight:600}
  .sec-title{font-size:1.05rem;margin:0 0 4px;color:var(--accent);font-weight:700}
  .detail-sum{font-size:1.05rem;color:var(--accent);font-weight:700;cursor:pointer;list-style:none;user-select:none}
  .detail-sum::-webkit-details-marker{display:none}
  details[open] .detail-sum::after{content:' ▴'}
  .detail h4{margin:14px 0 4px;font-size:.98rem;color:var(--ink);border-left:3px solid var(--accent2);padding-left:8px}
  .detail p{margin:.2em 0;line-height:1.85;font-size:.95rem}
  .note{font-size:.8rem;color:var(--sub);margin-top:8px}
  .err{color:var(--accent);font-weight:600}
  .dir{display:inline-block;background:var(--accent2);color:#fff;border-radius:6px;padding:1px 8px;font-size:.8rem}
  /* 일진 달력 */
  table.iljin{table-layout:fixed}
  table.iljin td{vertical-align:top;height:54px;padding:3px 2px}
  table.iljin td.empty{background:#faf8f2}
  table.iljin td.today{outline:2px solid var(--accent);outline-offset:-2px}
  table.iljin td.ijcell{cursor:pointer}
  table.iljin td.ijcell:hover{filter:brightness(.95)}
  table.iljin td.sel{outline:3px solid var(--accent2);outline-offset:-3px}
  tr.saeun-row,tr.wolun-row{cursor:pointer}
  tr.saeun-row:hover td,tr.wolun-row:hover td{background:#f4eede}
  tr.sel-row td{background:#f5e9c8!important}
  table.iljin .dnum{font-size:.72rem;color:var(--sub);text-align:left}
  table.iljin .ijg{font-size:1.05rem;font-weight:700;line-height:1.1}
  .yun-sel select{font-size:.95rem;padding:6px 8px}
  /* AI 풀이 */
  .aiout{margin-top:14px;line-height:1.95;font-size:.96rem}
  .aiout.streaming{white-space:pre-wrap;font-size:.92rem;color:var(--sub)}
  .aiout h3{font-size:1.12rem;color:var(--accent);margin:.9em 0 .2em}
  .aiout h4{font-size:1rem;color:var(--ink);border-left:3px solid var(--accent2);padding-left:8px;margin:1em 0 .3em}
  .aiout h5{font-size:.95rem;margin:.7em 0 .2em}
  .aiout:empty{display:none}
  @media(max-width:560px){.glyph{font-size:1.9rem}.form{gap:8px}
    table.iljin td{height:44px;font-size:.8rem}table.iljin .ijg{font-size:.85rem}}
</style>

<body>
<div class="wrap">
  <h1>🔮 사주 조회 <small>萬歲曆 · 1900~2050 · 한국천문연구원(KASI) 기반</small></h1>

  <div class="card no-print">
    <div class="form">
      <div class="field"><label>생년월일 (양력)</label>
        <input type="date" id="date" min="1900-01-01" max="2050-12-31" value="1990-05-15"></div>
      <div class="field"><label>태어난 시각</label>
        <input type="time" id="time" value="14:30"></div>
      <div class="field"><label>성별 (대운 방향)</label>
        <div class="seg" id="genderSeg">
          <button data-g="M" class="on">남</button><button data-g="F">여</button>
        </div></div>
    </div>
    <div class="form" style="margin-top:10px">
      <div class="field"><label>시간 보정</label>
        <select id="corrMode">
          <option value="jintaeyang" selected>진태양시 (출생지 경도)</option>
          <option value="flat30">표준시 −30분 (간이)</option>
          <option value="none">보정 안 함</option>
        </select></div>
      <div class="field" id="cityField"><label>출생지</label>
        <select id="citySel"></select></div>
      <div class="field" id="lonField" style="display:none"><label>경도(°E)</label>
        <input type="number" id="lonInput" step="0.001" value="126.978" style="width:100px"></div>
      <div class="field"><label>자시(子時) 처리</label>
        <select id="yajaMode">
          <option value="yaja" selected>야자시 (자정 기준)</option>
          <option value="jeong">정자시 (23시 기준)</option>
        </select></div>
      <label class="chk"><input type="checkbox" id="noTime"> 시각 모름(시주 제외)</label>
      <button class="go" id="go">조회</button>
      <button class="tool" id="btnPrint">🖨 인쇄</button>
      <button class="tool" id="btnImg">🖼 이미지 저장</button>
    </div>
    <!-- ── 입력정보 저장 / 불러오기 (브라우저 로컬 저장) ── -->
    <div class="form" style="margin-top:10px">
      <div class="field"><label>이름·메모 (저장용)</label>
        <input type="text" id="profileName" placeholder="예: 홍길동" style="width:150px" maxlength="30"></div>
      <button class="tool" id="btnSaveProfile">💾 입력 저장</button>
      <div class="field"><label>저장된 입력 불러오기</label>
        <select id="profileSel"><option value="">— 저장된 입력 없음 —</option></select></div>
      <button class="tool" id="btnDelProfile">🗑 삭제</button>
      <span class="note" id="profileMsg" style="align-self:center;margin:0"></span>
    </div>
    <div class="note">※ <b>진태양시</b>: 출생지 경도·균시차·과거 표준시(127.5°E)·서머타임을 자동 반영합니다. <b>자시 처리</b> — 야자시설(자정에 일주 변경) / 정자시설(23시에 일주 변경). 절입일 당일 출생은 시각에 따라 결과가 달라질 수 있습니다.<br>※ <b>입력 저장</b>은 이 브라우저에만 저장됩니다(서버 전송 없음). 다른 기기·브라우저에서는 보이지 않으며, 브라우저 데이터를 지우면 사라집니다.</div>
  </div>

  <!-- ── 만세력 달력 · 간지 찾기 도구 ── -->
  <div class="card no-print">
    <details id="calTool">
      <summary class="detail-sum">📅 만세력 달력 · 간지(60갑자) 찾기 ▾</summary>
      <div style="margin-top:12px">
        <div class="seg" id="calModeSeg" style="margin-bottom:12px">
          <button data-m="d2g" class="on">날짜 → 간지</button>
          <button data-m="g2d">간지 → 날짜 (생일찾기)</button>
        </div>
        <!-- 날짜 → 간지 -->
        <div id="calD2G" class="calpane">
          <div class="form">
            <div class="field"><label>양력 날짜</label>
              <input type="date" id="calDate" min="1900-01-01" max="2050-12-31" value="1990-05-15"></div>
            <button class="go" id="calGoD2G">조회</button>
          </div>
          <div id="calD2GOut"></div>
        </div>
        <!-- 간지 → 날짜 -->
        <div id="calG2D" class="calpane" style="display:none">
          <div class="form">
            <div class="field"><label>일주 (60갑자)</label>

// 그레고리 -> JDN
function toJDN(y,m,d){const a=Math.floor((14-m)/12);const yy=y+4800-a;const mm=m+12*a-3;
  return d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;}

// 변경점 이진탐색 (date문자열 <= 기준)
function lookupChange(changes,dateStr){let lo=0,hi=changes.length-1,ans=changes[0][1];
  while(lo<=hi){const mid=(lo+hi)>>1;if(changes[mid][0]<=dateStr){ans=changes[mid][1];lo=mid+1;}else hi=mid-1;}return ans;}

// 음력 계산: 월 시작점 배열에서 해당 월을 찾아 일수 차로 음력 일 계산
function lookupLunar(dateStr){
  const LM=WEB_DATA.lunarMonths;let lo=0,hi=LM.length-1,idx=0;
  while(lo<=hi){const mid=(lo+hi)>>1;if(LM[mid][0]<=dateStr){idx=mid;lo=mid+1;}else hi=mid-1;}
  const [sd,ly,lm,leap]=LM[idx];const[a,b,c]=sd.split('-').map(Number);const[d,e,f]=dateStr.split('-').map(Number);
  const day=(toJDN(d,e,f)-toJDN(a,b,c))+1;
  return {year:ly,month:lm,day,leap:!!leap};
}

// 십성: 일간(stemIdx) 기준 대상 천간(tIdx)의 십성
function tenGod(dayStem,tStem){
  const de=GAN_EL[dayStem], te=GAN_EL[tStem];
  const same=(dayStem%2)===(tStem%2); // 음양 동일
  const rel=(te-de+5)%5;
  if(rel===0) return same?'비견':'겁재';
  if(rel===1) return same?'식신':'상관';   // 내가 생
  if(rel===2) return same?'편재':'정재';   // 내가 극
  if(rel===3) return same?'편관':'정관';   // 나를 극
  return same?'편인':'정인';               // 나를 생
}
// 지지의 십성 = 지지 정기천간 기준

  ['1960-05-01','1960-09-18'],['1987-05-10','1987-10-11'],['1988-05-08','1988-10-09']
];
const inDST=(ds)=>DST.some(([a,b])=>ds>=a&&ds<=b);
// 표준자오선이 127.5°E(UTC+8:30)였던 기간 (그 외는 135°E)
const inStd1275=(ds)=>(ds>='1908-04-01'&&ds<='1911-12-31')||(ds>='1954-03-21'&&ds<='1961-08-09');
function dayOfYear(ds){const[Y,M,D]=ds.split('-').map(Number);return toJDN(Y,M,D)-toJDN(Y,1,1)+1;}
// 균시차(Equation of Time), 분
function equationOfTime(ds){const N=dayOfYear(ds);const B=2*Math.PI*(N-81)/364;
  return 9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);}
// 총 보정(분) 및 내역
function timeCorrection(ds){
  const mode=document.getElementById('corrMode').value;
  if(mode==='none')return {mode,corrMin:0};
  if(mode==='flat30')return {mode,corrMin:-30};
  const cs=document.getElementById('citySel');
  let lon;
  if(cs.value==='직접입력')lon=parseFloat(document.getElementById('lonInput').value)||126.978;
  else lon=parseFloat(cs.selectedOptions[0].dataset.lon);
  const std=inStd1275(ds)?127.5:135;
  const lonCorr=(lon-std)*4;      // 경도차 1도 = 4분
  const eot=equationOfTime(ds);
  const dst=inDST(ds)?-60:0;
  return {mode,corrMin:lonCorr+eot+dst,lon,std,lonCorr,eot,dst,city:cs.value};
}
// 시주 (시두법): 시지 branch로부터 시주 id
function hourPillarFromBranch(dayStem,b){const start=(dayStem%5)*2,st=(start+b)%10;
  for(let i=0;i<60;i++)if(i%10===st&&i%12===b)return i;return -1;}
// 보정 내역 표시
function corrHtml(corr,noTime,effMin,dayShift,effDateStr){
  if(noTime||corr.mode==='none')return '';
  if(corr.mode==='flat30')return '<span>보정 <b>표준시 −30분</b></span>';
  const total=Math.round(corr.corrMin);
  const eh=Math.floor(effMin/60), em=effMin%60;
  const parts=['경도 '+(corr.lonCorr>=0?'+':'')+corr.lonCorr.toFixed(0)+'분',
    '균시차 '+(corr.eot>=0?'+':'')+corr.eot.toFixed(0)+'분'];
  if(corr.dst)parts.push('서머타임 −60분');
  if(corr.std===127.5)parts.push('표준시 127.5°E');
  let s='<span title="'+parts.join(' · ')+'">진태양시 <b>'+(total>=0?'+':'')+total+'분</b> → '+pad2(eh)+':'+pad2(em)+'</span>';
  if(dayShift!==0)s+='<span style="color:var(--accent)">일주 기준일 <b>'+effDateStr+'</b> (자시 '+(dayShift>0?'익일':'전일')+')</span>';
  return s;
}

function fmt(id){return {id,hangul:hangulPillar(id),hanja:hanjaPillar(id)};}

function compute(){
  const dateStr=document.getElementById('date').value;
  const timeStr=document.getElementById('time').value||'00:00';
  const gender=document.querySelector('#genderSeg .on').dataset.g;
  const noTime=document.getElementById('noTime').checked;
  const yaja=document.getElementById('yajaMode').value==='yaja';
  const R=document.getElementById('result');

  if(!dateStr){R.innerHTML='<div class="card err">생년월일을 입력하세요.</div>';return;}

    R.innerHTML='<div class="card err">지원 범위(1900-01-01 ~ 2050-12-31)를 벗어났습니다.</div>';return;}
  const [Y,M,D]=dateStr.split('-').map(Number);
  const [h,mi]=timeStr.split(':').map(Number);
  const jdn=toJDN(Y,M,D);

  // 시간 보정 → 진태양 시각 및 자시 날짜 이동
  const corr=timeCorrection(dateStr);
  let effJdn=jdn, effDateStr=dateStr, effMin=h*60+mi, dayShift=0;
  if(!noTime){
    const rawMin=Math.round(h*60+mi+corr.corrMin);
    dayShift=yaja?Math.floor(rawMin/1440):Math.floor((rawMin+60)/1440);
    effMin=((rawMin%1440)+1440)%1440;
    effJdn=jdn+dayShift;
    const eg=fromJDN(effJdn); effDateStr=dateStrOf(eg.year,eg.month,eg.day);
  }
  const dayId=((effJdn+WEB_DATA.dayPillarOffset)%60+60)%60;
  const yearId=lookupChange(WEB_DATA.yearChanges,effDateStr);
  const monId=lookupChange(WEB_DATA.monthChanges,effDateStr);
  const dayStem=dayId%10;
  const hb=noTime?null:Math.floor((effMin+60)/120)%12;
  const hourId=noTime?null:hourPillarFromBranch(dayStem,hb);

    +corrHtml(corr,noTime,effMin,dayShift,effDateStr)
    +'<span>띠 <b>'+animal+'띠</b></span>'
    +(hb!=null?'<span>시지 <b>'+JI[hb]+'시</b></span>':'')
    +'<span>일간(나) <b class="el-'+EL_NAME[GAN_EL[dayStem]]+'">'+GAN[dayStem]+' ('+EL_NAME[GAN_EL[dayStem]]+')</b></span>'
    +'</div>';

  const gm=gongmang(dayId); // 일주 기준 공망 지지쌍
  html+='<div class="pillars">';
  for(const k of order){
    const p=P[k];
    const ge=EL_NAME[el(p.id,'gan')], je=EL_NAME[el(p.id,'ji')];
    const tgGan=(k==='일')?'<span style="color:var(--accent2)">일간</span>':tenGod(dayStem,p.id%10);
    const tgJi=tenGodJi(dayStem,p.id%12);

    html+='<div class="col">'
      +'<h3>'+k+'주</h3>'

      +'<div class="kor">'+GAN[p.id%10]+' · '+ge+'</div>'
      +'<div class="glyph bg-'+je+' el-'+je+(isGM?' gongmang':'')+'">'+JI_H[p.id%12]+'</div>'
      +'<div class="kor">'+JI[p.id%12]+' · '+je+(isGM?' <span class="gm-tag">공망</span>':'')+'</div>'
      +'<div class="ten">'+tgJi+'</div>'
      +'<div class="us">운성 '+unseong(dayStem,p.id%12)+'</div>'
      +jijangganHtml(dayStem,p.id%12)
      +'</div>';
  }
  html+='</div>';

  // 오행 분포 집계
  const cnt=[0,0,0,0,0];
  for(const k of order){cnt[el(P[k].id,'gan')]++;cnt[el(P[k].id,'ji')]++;}

  // ── 명식 해석 요약 ──

  html+=renderSummary(dayStem,cnt,ss.names,unseong(dayStem,P['일'].id%12),dm.forward,dm.startAge,animal);
  // ── 궁위별 해석 ──

  // ── 상세 해설 ──

  // ── 대운 ──

  // ── 월운 · 일진 ──

  html+=renderWolunCard(nowY)+renderIljinCard(nowY,nowM);
  // ── AI 풀이용 명식 요약 + 카드 ──
  {
    const _sin=sinStrength(P,dayStem), _gg=gyeokguk(P,dayStem), _dec=yongsinDecision(_sin.cat,_sin.sinType);
    const catStr=['비겁','식상','재성','관성','인성'].map(c=>c+_sin.cat[c]).join(' ');
    const pilStr=['년','월','일','시'].filter(k=>P[k]).map(k=>k+'주 '+hanjaPillar(P[k].id)+'('+hangulPillar(P[k].id)+')').join(', ');
    window.__sajuAi=[
      '생년월일시: '+dateStr+(noTime?' (시각 미상)':' '+timeStr)+' · 성별 '+(gender==='M'?'남':'여'),
      '음력: '+L.year+'.'+String(L.month).padStart(2,'0')+'.'+String(L.day).padStart(2,'0')+(L.leap?' 윤달':'')+' · '+animal+'띠',
      '사주(년월일시): '+pilStr,
      '일간(본인): '+GAN_H[dayStem]+' '+GAN[dayStem]+'('+EL_NAME[GAN_EL[dayStem]]+')',
      '오행 분포: '+EL_NAME.map((n,i)=>n+cnt[i]).join(' '),
      '십성 분포: '+catStr,
      '신강지수: '+_sin.sinScore+'/100 ('+_sin.sinType+')',
      '격국: '+_gg.name+' ('+_gg.note+')',
      '용신(억부): '+_dec.yong+' / 희신: '+_dec.hui+' / 기신: '+_dec.gi,
      '주요 신살: '+(ss.names.join(', ')||'뚜렷한 것 없음'),
      '대운: '+(dm.forward?'순행':'역행')+', '+dm.startAge+'세부터 10년 주기',
    ].join('\n');
  }
  html+=renderAiCard();

  R.innerHTML=html;
  // 일진 상세 해석용 컨텍스트(일간·일지·용신/기신 오행)
  {
    const dec=yongsinDecision(sinStrength(P,dayStem).cat, sinStrength(P,dayStem).sinType);
    const D=GAN_EL[dayStem], Em={비겁:D,인성:(D+4)%5,식상:(D+1)%5,재성:(D+2)%5,관성:(D+3)%5};
    const yongEls=new Set(), giEls=new Set();
    if(dec.yong!=='중화'){ if(Em[dec.yong]!=null)yongEls.add(Em[dec.yong]); if(Em[dec.hui]!=null)yongEls.add(Em[dec.hui]); if(Em[dec.gi]!=null)giEls.add(Em[dec.gi]); }
    CTX={dayStem, dayBranch:P['일'].id%12, yongEls, giEls};
  }
  fillWolun(nowY); fillIljin(nowY,nowM); wireYunControls(); wireAi();
}

function renderSinsal(P,order){
  const dayId=P['일'].id, dayStem=dayId%10;
  const jiOf={}, ganOf={};
  order.forEach(k=>{jiOf[k]=P[k].id%12; ganOf[k]=P[k].id%10;});
  const jl={시:'시지',일:'일지',월:'월지',년:'년지'}, gl={시:'시간',일:'일간',월:'월간',년:'년간'}, pl={시:'시주',일:'일주',월:'월주',년:'년주'};
  const jiLoc=(arr)=>{const s=new Set(arr);return order.filter(k=>s.has(jiOf[k])).map(k=>jl[k]+'('+JI_H[jiOf[k]]+')').join(', ');};
  const ganLoc=(arr)=>{const s=new Set(arr);return order.filter(k=>s.has(ganOf[k])).map(k=>gl[k]+'('+GAN_H[ganOf[k]]+')').join(', ');};
  const pairLoc=(chk)=>{const r=[];for(let a=0;a<order.length;a++)for(let b=a+1;b<order.length;b++){
    const x=jiOf[order[a]],y=jiOf[order[b]];if(chk(x,y))r.push(jl[order[a]]+'·'+jl[order[b]]+'('+JI_H[x]+'·'+JI_H[y]+')');}return r.join(', ');};
  const pillarLoc=(setc)=>order.filter(k=>setc(hangulPillar(P[k].id))).map(k=>pl[k]+'('+hanjaPillar(P[k].id)+')').join(', ');
  const mb=jiOf['월'], g=groupOf(jiOf['일']);
  const rows=[];
  const push=(name,cat,desc,loc)=>{ if(loc) rows.push({name,cat,desc,loc}); };
  // ── 길신 ──
  push('천을귀인','길','天乙貴人 · 최고의 길신, 위기에 귀인', jiLoc(CHEONEUL[dayStem]));
  const td=CHEONDEOK[mb]; push('천덕귀인','길','天德貴人 · 하늘의 덕, 재난 방지', td[0]==='ji'?jiLoc([td[1]]):ganLoc([td[1]]));
  push('월덕귀인','길','月德貴人 · 달의 덕, 온화·복록', ganLoc([WOLDEOK_STEM[SAMHAP.findIndex(G=>G.s.includes(mb))]]));
  push('문창귀인','길','文昌貴人 · 학문·총명·시험', jiLoc([MUNCHANG[dayStem]]));
  push('천의성','길','天醫星 · 의약·치유·활인업', jiLoc([(mb-1+12)%12]));
  push('금여','길','金輿 · 배우자복·유순·복록', jiLoc([GEUMYEO[dayStem]]));
  push('암록','길','暗祿 · 숨은 복, 귀인 조력', jiLoc([AMLOK[dayStem]]));
  // ── 이동·인기(중립) ──
  push('역마','중','驛馬 · 이동·변동·해외', jiLoc([g.역마]));
  push('도화','중','桃花 · 매력·인기·이성', jiLoc([g.도화]));
  push('화개','중','華蓋 · 예술·종교·고독', jiLoc([g.화개]));
  // ── 흉살 ──
  if(YANGIN[dayStem]!=null) push('양인','흉','羊刃 · 강한 기운, 극단 주의', jiLoc([YANGIN[dayStem]]));
  push('홍염살','흉','紅艶殺 · 매력·끼, 이성 구설', jiLoc([HONGYEOM[dayStem]]));
  push('백호대살','흉','白虎大殺 · 혈광·사고·수술 주의', pillarLoc(h=>BAEKHO_SET.has(h)));
  push('괴강살','흉','魁罡殺 · 극강·총명, 고집 주의', pillarLoc(h=>GWAEGANG_SET.has(h)));
  push('원진살','흉','怨嗔殺 · 까닭없는 미움·불화', pairLoc((x,y)=>WONJIN_SET.has(_k2s(x,y))));
  push('귀문관살','흉','鬼門關殺 · 예민·직관, 집착 주의', pairLoc((x,y)=>GWIMUN_SET.has(_k2s(x,y))));
  // ── 공망 (항상 표시) ──
  const gm=gongmang(dayId);

  rows.push({name:'공망',cat:'중',desc:'空亡 · 비어있음 ('+JI[gm[0]]+'·'+JI[gm[1]]+')',loc:gmLoc});

  const catStyle={길:'color:var(--mok)',흉:'color:var(--accent)',중:''};

  let body='';
  for(const r of rows){
    body+='<tr><td style="font-weight:700;white-space:nowrap;'+catStyle[r.cat]+'">'+catTag[r.cat]+' '+r.name+'</td>'

  const sjArr=[[2,3,4],[8,9,10],[11,0,1],[5,6,7]][SAMHAP.findIndex(G=>G.s.includes(jiOf['년']))];
  const samjae=sjArr.map(i=>JI[i]).join('·')+'년';
  const names=rows.filter(r=>!(r.name==='공망'&&!gmL.length)).map(r=>r.name);
  const html='<div class="card"><div class="sec-title">신살 (神殺)</div>'
    +'<table><tr><th>신살</th><th>의미</th><th>위치</th></tr>'+body+'</table>'
    +'<div class="note">※ <b class="el-목">길</b>=길신 · <b class="el-화">흉</b>=흉살 · 중=중립. 삼재(三災): 이 명조는 <b>'+samjae+'</b>에 듭니다(띠 12년 주기 참고). 신살은 유파에 따라 기준·해석이 다를 수 있는 참고 지표입니다.</div></div>';
  return {html,names};
}

// 대운 방향·대운수만 계산(요약문 공유용)
function daeunMeta(dateStr,yearId,monId,gender){
  const yin=(yearId%10)%2;
  const forward=(gender==='M'&&yin===0)||(gender==='F'&&yin===1);
  const mc=WEB_DATA.monthChanges;let nextB=null,prevB=null;
  for(let i=0;i<mc.length;i++){if(mc[i][0]>dateStr){nextB=mc[i][0];prevB=mc[i-1]?mc[i-1][0]:mc[0][0];break;}}
  if(!nextB)prevB=mc[mc.length-1][0];
  const days=forward?(nextB?daysBetween(dateStr,nextB):3):(prevB?daysBetween(prevB,dateStr):3);
  return {forward,startAge:Math.max(1,Math.round(days/3))};
}

// ══ 오행·십성 분포 차트 + 신강지수 게이지 ══
function chartBar(label,val,max,color){
  const pct=max?Math.round(val/max*100):0;
  return '<div style="display:flex;align-items:center;gap:8px;margin:5px 0">'
    +'<div style="width:56px;font-size:.85rem;color:var(--sub);text-align:right">'+label+'</div>'
    +'<div style="flex:1;background:#ece4d3;border-radius:6px;height:18px;overflow:hidden">'
      +'<div style="width:'+pct+'%;height:100%;background:'+color+';transition:width .3s"></div></div>'
    +'<div style="width:26px;font-size:.85rem;font-weight:600">'+val+'</div></div>';
}
function sinGauge(v){
  return '<div style="margin:6px 0 2px">'
    +'<div style="position:relative;height:26px;border-radius:6px;overflow:hidden;'
      +'background:linear-gradient(90deg,#2b3a55 0%,#2b3a55 45%,#b8860b 45%,#b8860b 55%,#8a1c1c 55%,#8a1c1c 100%)">'
    +'<div style="position:absolute;left:'+v+'%;top:0;transform:translateX(-50%);height:26px;width:3px;background:#fff;box-shadow:0 0 0 1px #000"></div>'
    +'<div style="position:absolute;left:'+Math.min(92,Math.max(8,v))+'%;top:0;transform:translateX(-50%);'
      +'color:#fff;font-size:.75rem;font-weight:700;line-height:26px;text-shadow:0 0 3px #000">'+v+'</div>'
    +'</div>'
    +'<div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--sub);margin-top:2px">'
      +'<span>신약 0</span><span>중화 50</span><span>신강 100</span></div></div>';
}
// 신강약 계산 (위치 가중) — 차트·용신 공용
function sinStrength(P,dayStem){
  const W_GAN={년:0.8,월:1.0,시:1.0}, W_JI={년:0.8,월:2.0,일:1.5,시:1.0};
  const cat={비겁:0,식상:0,재성:0,관성:0,인성:0};
  let ally=0,total=0;
  for(const k of Object.keys(P)){
    if(k!=='일'){const c=CAT_OF[tenGod(dayStem,P[k].id%10)];cat[c]++;
      total+=W_GAN[k];if(c==='비겁'||c==='인성')ally+=W_GAN[k];}
    const cj=CAT_OF[tenGodJi(dayStem,P[k].id%12)];cat[cj]++;
    total+=W_JI[k];if(cj==='비겁'||cj==='인성')ally+=W_JI[k];
  }
  const sinScore=Math.round(ally/total*100);
  const sinType=sinScore>=55?'신강':(sinScore<=45?'신약':'중화');
  return {sinScore,sinType,cat};
}
function renderCharts(P,dayStem,cnt){
  const {sinScore,sinType,cat}=sinStrength(P,dayStem);
  const EL_COLOR=['#2e7d4f','#c0392b','#b8860b','#8896a6','#2b3a55'];
  const maxEl=Math.max(...cnt,1);
  let oh='';for(let e=0;e<5;e++)oh+=chartBar(EL_NAME[e]+EL_HAN[e],cnt[e],maxEl,EL_COLOR[e]);
  const CAT_ORDER=['비겁','식상','재성','관성','인성'];
  const CAT_COLOR={비겁:'#8a1c1c',식상:'#2e7d4f',재성:'#b8860b',관성:'#8896a6',인성:'#2b3a55'};
  const maxCat=Math.max(...CAT_ORDER.map(c=>cat[c]),1);
  let tg='';for(const c of CAT_ORDER)tg+=chartBar(c,cat[c],maxCat,CAT_COLOR[c]);
  const hd=(t)=>'<div style="font-weight:700;color:var(--accent2);margin:0 0 6px;font-size:.92rem">'+t+'</div>';
  return '<div class="card"><div class="sec-title">오행 · 십성 분포 & 신강지수</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:20px">'
      +'<div style="flex:1;min-width:230px">'+hd('오행(五行) 분포')+oh+'</div>'
      +'<div style="flex:1;min-width:230px">'+hd('십성(十星) 분포')+tg+'</div></div>'
    +'<div style="margin-top:16px">'+hd('신강·신약 지수 — '+sinType+' ('+sinScore+')')+sinGauge(sinScore)+'</div>'
    +'<div class="note">※ 신강지수는 월령(월지) 등 위치 가중을 반영해 아군(비겁·인성) 비율(%)로 산출한 간이 지표입니다. 45 이하 신약 · 55 이상 신강.</div></div>';
}

// ══ 격국(格局) · 용신(用神) ══
const LOKJI=[2,3,5,6,5,6,8,9,11,0]; // 일간 -> 건록지(祿) 지지 index
function gyeokguk(P,dayStem){
  const mb=P['월'].id%12, hidden=JIJANGGAN[mb], mainGan=JI_MAIN_GAN[mb];
  const stems=[]; for(const k of ['년','월','시']) if(P[k]) stems.push(P[k].id%10);
  // 1) 건록·양인 우선 (월지가 일간의 록지/양인지)
  if(mb===LOKJI[dayStem]) return {name:'건록격 建祿格',note:'월지 '+JI_H[mb]+'가 일간의 건록(祿)'};
  if(YANGIN[dayStem]!=null&&mb===YANGIN[dayStem]) return {name:'양인격 羊刃格',note:'월지 '+JI_H[mb]+'가 일간의 양인(羊刃)'};
  // 2) 지장간 중 천간 투출한 것(비겁 제외)으로 격 — 정기 우선, 그다음 중기·여기
  const mainTen=tenGod(dayStem,mainGan), mainCat=CAT_OF[mainTen];
  let gGan=null, tou=false;
  if(mainCat!=='비겁'&&stems.includes(mainGan)){gGan=mainGan;tou=true;}
  else for(const g of hidden){ if(stems.includes(g)&&CAT_OF[tenGod(dayStem,g)]!=='비겁'){gGan=g;tou=true;break;} }
  // 3) 투출 없음 → 정기 기준 (정기가 비겁이면 비견/겁재격)
  if(gGan===null){
    if(mainCat==='비겁') return {name:(mainTen==='비견'?'비견격 比肩格':'겁재격 劫財格'),
      note:'월지 '+JI_H[mb]+' 정기 '+mainTen+' (건록·양인 아님, 재관인 미투출)'};
    gGan=mainGan;
  }
  const ten=tenGod(dayStem,gGan);
  const NAME={정관:'정관격 正官格',편관:'편관격(칠살) 偏官格',정재:'정재격 正財格',편재:'편재격 偏財格',
    식신:'식신격 食神格',상관:'상관격 傷官格',정인:'정인격 正印格',편인:'편인격 偏印格'};
  return {name:NAME[ten]||ten+'격', ten,
    note:'월지 '+JI_H[mb]+' 지장간 '+GAN_H[gGan]+'('+ten+')'+(tou?' 천간 투출':' · 미투출(정기 기준)')};
}

  '겁재격 劫財格':'경쟁심과 추진력이 강해 동료·동업과 인연이 깊은 그릇입니다.'};
// 억부용신 판정 (renderYongsin·CTX 공용)
function yongsinDecision(cat,sinType){
  let yong,hui,gi,logic;
  if(sinType==='신강'){
    if(cat.인성>=cat.비겁&&cat.인성>0){yong='재성';hui='식상';gi='인성';
      logic='인성(印)이 왕해 일간이 강하니, <b>재성(財)</b>으로 인성을 억제하고 식상으로 기운을 흘려보내는 것이 좋습니다.';}
    else{yong=(cat.관성>0?'관성':'식상');hui=(yong==='관성'?'식상':'재성');gi='비겁';
      logic='비겁(比劫)이 왕해 일간이 강하니, <b>'+(yong==='관성'?'관성(官)으로 억제':'식상(食傷)으로 설기')+'</b>하고 재성으로 결실을 맺는 것이 좋습니다.';}
  }else if(sinType==='신약'){
    if(cat.관성>=2||cat.재성>=3){yong='인성';hui='비겁';gi='재성';
      logic='재관(財官)이 강해 일간이 약하니, <b>인성(印)</b>으로 통관·생조하여 일간을 보호하는 것이 좋습니다.';}
    else{yong='비겁';hui='인성';gi='식상';
      logic='일간이 약하니 <b>비겁(比劫)</b>으로 부조하고 인성(印)으로 생조하여 힘을 보강하는 것이 좋습니다.';}
  }else{yong='중화';hui='—';gi='—';
    logic='일간의 강약이 중화(中和)에 가까워 특정 오행에 크게 치우치지 않습니다. 대운의 흐름에 따라 부족한 쪽을 보완하는 것이 좋습니다.';}
  return {yong,hui,gi,logic};
}

    가을:'가을생이라 금기가 왕하니, 화(火)로 다스리거나 수(水)로 설기하면 조후가 맞습니다.'};
  return '<div class="card"><div class="sec-title">격국 · 용신 (格局 · 用神)</div>'

    +'<div style="margin-top:8px;line-height:1.8">'+logic+'</div>'
    +'<div class="note">※ 격국=월지(월령) 정기·투출 기준, 용신=억부법(신강 '+sinScore+') 기준의 간이 판정입니다. 조후·병약·통관 등 다른 용신법과 유파에 따라 달라질 수 있어 참고용입니다.</div></div>';
}

// ══ 납음오행(納音五行) · 명궁(命宮) ══

const NAPEUM=[

  ['산두화',1],['간하수',4],['성두토',2],['백랍금',3],['양류목',0],
  ['천중수',4],['옥상토',2],['벽력화',1],['송백목',0],['장류수',4],
  ['사중금',3],['산하화',1],['평지목',0],['벽상토',2],['금박금',3],
  ['복등화',1],['천하수',4],['대역토',2],['차천금',3],['상자목',0],
  ['대계수',4],['사중토',2],['천상화',1],['석류목',0],['대해수',4]

function renderMyeonggung(P,dayStem,hb,yearStem){
  if(hb==null) return ''; // 시각 미상 시 명궁 생략
  const mb=P['월'].id%12;

  const gung=N-1;                                  // 명궁 지지 index (자0)

  const gStem=(inStem+((gung-2+12)%12))%10;        // 명궁 천간
  let gid=-1; for(let i=0;i<60;i++)if(i%10===gStem&&i%12===gung){gid=i;break;}

    +'<span>납음 <b>'+np[0]+'</b></span></div>'
    +'<div style="line-height:1.85">명궁은 태어난 <b>월지·시지</b>로 정하는 선천의 자리로, 사주 전체의 <b>정신적 지향과 그릇</b>을 봅니다. '
    +'일간 기준 <b>'+ten+'</b>에 해당하여 <b>'+(CAT_PHRASE[CAT_OF[ten]]||'')+'</b>의 기운이 바탕에 깔려 있습니다.</div>'
    +'<div class="note">※ 명궁 지지 = 생월수+생시수(합 ≤14: 14−합, 초과: 26−합), 천간은 년간 오호둔(五虎遁). 자평 전통 방식이며 시각(시지)이 있어야 산출됩니다.</div></div>';
}

// ══ 합·충·형·파·해 (刑沖破害) ══
const _k2=(a,b)=>a<b?a+'-'+b:b+'-'+a;
const GANHAP=(a,b)=>(a+5)%10===b;            // 천간합 갑기·을경…
const GANCHUNG=(a,b)=>Math.abs(a-b)===6;      // 천간충 갑경·을신·병임·정계
const YUKHAP=(a,b)=>a!==b&&(1-a+12)%12===b;   // 지지 육합 (자축·인해…)
const CHUNG=(a,b)=>(a+6)%12===b;              // 지지 충 (자오·축미…)
const HAE=(a,b)=>a!==b&&(7-a+12)%12===b;      // 지지 해 (자미·축오…)
const PA_SET=new Set(['0-9','3-6','5-8','2-11','1-4','7-10']); // 자유·오묘·신사·인해·진축·술미
const PA=(a,b)=>PA_SET.has(_k2(a,b));
const HYUNG_SET=new Set(['0-3','2-5','5-8','2-8','1-10','7-10','1-7']); // 자묘·인사신·축술미
const HYUNG=(a,b)=>a===b?[4,6,9,11].includes(a):HYUNG_SET.has(_k2(a,b)); // 자형 진오유해
const BANHAP=(a,b)=>a!==b&&SAMHAP.some(G=>G.s.includes(a)&&G.s.includes(b));
const REL_COLOR={합:'#2e7d4f',삼합:'#2e7d4f',충:'#c0392b',형:'#7b3fa0',파:'#cc7a00',해:'#8a5a2b'};
const REL_MEAN={천간합:'천간이 합하여 유정(有情)해집니다.',천간충:'천간이 충돌하여 변동·갈등이 있습니다.',
  육합:'지지가 합하여 결속·화합합니다.',삼합:'삼합국을 이뤄 강한 세력을 형성합니다.',
  충:'지지가 충돌하여 이동·변동·자극이 있습니다.',형:'형(刑) — 갈등·조정·수술·관재를 조심합니다.',
  파:'파(破) — 깨짐·이탈·중단의 기운입니다.',해:'해(害) — 시기·방해·불화의 기운입니다.'};
const EL_BG5=['#e8f3ec','#fbe9e7','#f7f0dd','#eef1f5','#e9edf4'];
const EL_FG5=['#2e7d4f','#c0392b','#b8860b','#8896a6','#2b3a55'];
function renderRelations(P){
  const order=['시','일','월','년'].filter(k=>P[k]);
  const n=order.length;
  const gan=order.map(k=>P[k].id%10), ji=order.map(k=>P[k].id%12);
  const ganRels=[], jiRels=[];
  for(let i=0;i<n;i++)for(let j=i+1;j<n;j++){
    const gl=[];
    if(GANHAP(gan[i],gan[j]))gl.push(['합','천간합']);
    if(GANCHUNG(gan[i],gan[j]))gl.push(['충','천간충']);
    if(gl.length)ganRels.push({i,j,labs:gl});
    const jl=[];
    if(YUKHAP(ji[i],ji[j]))jl.push(['합','육합']);
    if(BANHAP(ji[i],ji[j]))jl.push(['삼합','삼합']);
    if(CHUNG(ji[i],ji[j]))jl.push(['충','충']);
    if(HYUNG(ji[i],ji[j]))jl.push(['형','형']);
    if(PA(ji[i],ji[j]))jl.push(['파','파']);
    if(HAE(ji[i],ji[j]))jl.push(['해','해']);
    if(jl.length)jiRels.push({i,j,labs:jl});
  }
  // ── SVG 관계도 ──
  const W=110,H=280,yG=110,yJ=180,r=22;
  const cx=(c)=>c*W+W/2;
  const arc=(i,j,anchorY,dir,labs)=>{
    const xi=cx(i),xj=cx(j),mid=(xi+xj)/2,dist=j-i,peak=16+dist*16;
    const cy=anchorY+dir*peak, col=REL_COLOR[labs[0][0]];
    const ly=anchorY+dir*(peak*0.6), text=labs.map(l=>l[0]).join('·');
    const w=text.length*11+8;
    return '<path d="M '+xi+' '+anchorY+' Q '+mid+' '+cy+' '+xj+' '+anchorY+'" fill="none" stroke="'+col+'" stroke-width="2"/>'
      +'<rect x="'+(mid-w/2)+'" y="'+(ly-9)+'" width="'+w+'" height="17" rx="4" fill="'+col+'"/>'
      +'<text x="'+mid+'" y="'+(ly+3.5)+'" fill="#fff" font-size="11" text-anchor="middle">'+text+'</text>';
  };
  let arcs='';
  for(const rl of ganRels) arcs+=arc(rl.i,rl.j,yG-r,-1,rl.labs);
  for(const rl of jiRels) arcs+=arc(rl.i,rl.j,yJ+r,1,rl.labs);
  let nodes='';
  for(let c=0;c<n;c++){
    const geg=GAN_EL[gan[c]], jeg=JI_EL[ji[c]];
    nodes+='<text x="'+cx(c)+'" y="20" text-anchor="middle" font-size="13" fill="#7a6f63">'+order[c]+'주</text>'
      +'<circle cx="'+cx(c)+'" cy="'+yG+'" r="'+r+'" fill="'+EL_BG5[geg]+'" stroke="'+EL_FG5[geg]+'"/>'
      +'<text x="'+cx(c)+'" y="'+(yG+8)+'" text-anchor="middle" font-size="24" font-weight="700" fill="'+EL_FG5[geg]+'">'+GAN_H[gan[c]]+'</text>'
      +'<circle cx="'+cx(c)+'" cy="'+yJ+'" r="'+r+'" fill="'+EL_BG5[jeg]+'" stroke="'+EL_FG5[jeg]+'"/>'
      +'<text x="'+cx(c)+'" y="'+(yJ+8)+'" text-anchor="middle" font-size="24" font-weight="700" fill="'+EL_FG5[jeg]+'">'+JI_H[ji[c]]+'</text>';
  }
  const svg='<svg viewBox="0 0 '+(n*W)+' '+H+'" style="width:100%;max-width:'+(n*118)+'px;display:block;margin:4px auto">'+arcs+nodes+'</svg>';
  // ── 범례 ──
  const legItems=['합','삼합','충','형','파','해'];
  const legend='<div style="display:flex;flex-wrap:wrap;gap:6px 12px;justify-content:center;margin:6px 0 4px">'
    +legItems.map(l=>'<span style="font-size:.8rem"><span style="display:inline-block;width:11px;height:11px;border-radius:3px;background:'+REL_COLOR[l]+';vertical-align:middle;margin-right:3px"></span>'+l+'</span>').join('')+'</div>';
  // ── 텍스트 목록 ──
  let items='';
  const add=(chars,labs)=>{
    for(const [sh,full] of labs){
      items+='<tr><td style="font-weight:700;white-space:nowrap">'+chars+'</td>'
        +'<td><span style="color:#fff;background:'+REL_COLOR[sh]+';border-radius:4px;padding:1px 7px;font-size:.8rem">'+full+'</span></td>'
        +'<td style="text-align:left;color:var(--sub);font-size:.86rem">'+(REL_MEAN[full]||'')+'</td></tr>'; }
  };
  for(const rl of ganRels) add(order[rl.i]+'·'+order[rl.j]+' 천간 '+GAN_H[gan[rl.i]]+GAN_H[gan[rl.j]], rl.labs);
  for(const rl of jiRels) add(order[rl.i]+'·'+order[rl.j]+' 지지 '+JI_H[ji[rl.i]]+JI_H[ji[rl.j]], rl.labs);
  const table=items?('<table><tr><th>위치</th><th>관계</th><th>의미</th></tr>'+items+'</table>')
    :'<div class="note" style="text-align:center">뚜렷한 합·충·형·파·해 관계가 없습니다.</div>';
  return '<div class="card"><div class="sec-title">합·충·형·파·해 (刑沖破害)</div>'+svg+legend+table
    +'<div class="note">※ 원국 4기둥 사이의 천간·지지 상호작용입니다. 인접·원격, 합화 성립 여부 등 세부 통변은 유파에 따라 달라집니다.</div></div>';
}

function mdLite(s){
  const esc=s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return esc
    .replace(/^\s*#{4,6}\s?(.*)$/gm,'<h5>$1</h5>')
    .replace(/^\s*#{2,3}\s?(.*)$/gm,'<h4>$1</h4>')
    .replace(/^\s*#\s?(.*)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<b>$1</b>')
    .replace(/^\s*[-*]\s+(.*)$/gm,'· $1')
    .replace(/\n/g,'<br>');
}
async function runAi(){
  const out=document.getElementById('aiOut'), btn=document.getElementById('aiBtn');
  if(!window.__sajuAi){out.innerHTML='<span class="err">먼저 사주를 조회하세요.</span>';return;}
  out.classList.add('streaming'); out.textContent=''; btn.disabled=true; btn.textContent='생성 중… (최대 1분)';
  let full='';
  try{
    const res=await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({saju:window.__sajuAi})});
    if(!res.ok){out.classList.remove('streaming');
      out.innerHTML='<span class="err" style="white-space:pre-wrap">'+(await res.text()).replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</span>';return;}
    const reader=res.body.getReader(), td=new TextDecoder();
    for(;;){const {done,value}=await reader.read(); if(done)break;
      full+=td.decode(value,{stream:true}); out.textContent=full; out.scrollTop=out.scrollHeight;}
    out.classList.remove('streaming'); out.innerHTML=mdLite(full);
  }catch(e){out.classList.remove('streaming');
    out.innerHTML='<span class="err">요청 실패: '+e.message+' — 파일을 직접 열지 말고 server.mjs(localhost:8123)로 실행했는지 확인하세요.</span>';}
  finally{btn.disabled=false; btn.textContent='🤖 AI 풀이 다시 생성';}
}

function renderDaeun(dateStr,jdn,yearId,monId,dayStem,gender){
  const yStemYin=(yearId%10)%2; // 0=양,1=음
  // 양남/음녀=순행, 음남/양녀=역행
  const forward=(gender==='M'&&yStemYin===0)||(gender==='F'&&yStemYin===1);
  // 節 경계
  const mc=WEB_DATA.monthChanges;
  let nextB=null,prevB=null;
  for(let i=0;i<mc.length;i++){if(mc[i][0]>dateStr){nextB=mc[i][0];prevB=mc[i-1]?mc[i-1][0]:mc[0][0];break;}}
  if(!nextB){prevB=mc[mc.length-1][0];}
  let days= forward? (nextB?daysBetween(dateStr,nextB):3) : (prevB?daysBetween(prevB,dateStr):3);
  let startAge=Math.max(1,Math.round(days/3));

  let rows='';
  for(let i=0;i<8;i++){
    const pid=((monId+(forward?(i+1):-(i+1)))%60+60)%60;
    const age=startAge+i*10;
    const gTen=tenGod(dayStem,pid%10), jTen=tenGodJi(dayStem,pid%12);
    const ge=EL_NAME[GAN_EL[pid%10]];
    rows+='<tr><td>'+age+'~'+(age+9)+'세</td>'
      +'<td class="el-'+ge+'" style="font-weight:700">'+hanjaPillar(pid)+' <span style="color:var(--sub);font-weight:400">'+hangulPillar(pid)+'</span></td>'
      +'<td>'+gTen+'</td><td>'+jTen+'</td></tr>';
  }
  return '<div class="card"><div class="sec-title">대운 (大運) · 10년 주기</div>'
    +'<div class="meta"><span>방향 <span class="dir">'+(forward?'순행 順':'역행 逆')+'</span></span>'
    +'<span>대운수(시작) <b>'+startAge+'세</b></span></div>'

function fillIljin(y,m){
  if(!CTX)return; const ds=CTX.dayStem, off=WEB_DATA.dayPillarOffset;
  const firstJdn=toJDN(y,m,1), firstDow=((firstJdn%7)+7)%7; // 0=월
  const nY=m===12?y+1:y, nM=m===12?1:m+1, dim=toJDN(nY,nM,1)-firstJdn;
  const now=new Date(), isTM=(now.getFullYear()===y&&now.getMonth()+1===m), today=now.getDate();
  const WD=['월','화','수','목','금','토','일'];
  let html='<table class="iljin"><tr>'+WD.map(w=>'<th>'+w+'</th>').join('')+'</tr><tr>';
  let col=0;
  for(let i=0;i<firstDow;i++){html+='<td class="empty"></td>';col++;}
  for(let d=1;d<=dim;d++){
    if(col===7){html+='</tr><tr>';col=0;}
    const jdn=firstJdn+(d-1), pid=((jdn+off)%60+60)%60, ge=EL_NAME[GAN_EL[pid%10]];
    const star=(isTM&&d===today);
    html+='<td class="ijcell bg-'+ge+(star?' today':'')+'" data-pid="'+pid+'" data-y="'+y+'" data-m="'+m+'" data-d="'+d+'">'
      +'<div class="dnum">'+d+(star?' ★':'')+'</div>'
      +'<div class="ijg el-'+ge+'">'+hanjaPillar(pid)+'</div>'
      +'<div style="font-size:.62rem;color:var(--sub)">'+tenGod(ds,pid%10)+'</div></td>';
    col++;
  }
  while(col>0&&col<7){html+='<td class="empty"></td>';col++;}
  html+='</tr></table>';
  document.getElementById('iljinBody').innerHTML=html;
}

function saveImage(){
  const node=document.getElementById('result');
  if(typeof html2canvas!=='function'){alert('이미지 라이브러리를 불러오지 못했습니다. 인쇄 기능을 이용해 주세요.');return;}
  const btn=document.getElementById('btnImg'),old=btn.textContent;
  btn.textContent='생성 중…';btn.disabled=true;
  html2canvas(node,{backgroundColor:'#f4efe6',scale:2}).then(canvas=>{
    canvas.toBlob(b=>{
      const a=document.createElement('a'),dt=document.getElementById('date').value||'saju';
      a.href=URL.createObjectURL(b);a.download='사주_'+dt+'.png';a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      btn.textContent=old;btn.disabled=false;
    },'image/png');
  }).catch(e=>{alert('이미지 생성 실패: '+e.message);btn.textContent=old;btn.disabled=false;});
}
// ══════════════════════════════════════════
//  만세력 달력 · 간지 찾기 도구
// ══════════════════════════════════════════
const WD_JDN=['월','화','수','목','금','토','일']; // JDN%7: 0=월
const pad2=(n)=>String(n).padStart(2,'0');
// JDN -> 그레고리 날짜 (역변환)
function fromJDN(jdn){
  let a=jdn+32044, b=Math.floor((4*a+3)/146097), c=a-Math.floor(146097*b/4);
  let d=Math.floor((4*c+3)/1461), e=c-Math.floor(1461*d/4), m=Math.floor((5*e+2)/153);
  const day=e-Math.floor((153*m+2)/5)+1, month=m+3-12*Math.floor(m/10), year=100*b+d-4800+Math.floor(m/10);
  return {year,month,day};
}
const dateStrOf=(y,m,d)=>y+'-'+pad2(m)+'-'+pad2(d);

// 60갑자 select 채우기
(function(){const sel=document.getElementById('calGanji');
  for(let i=0;i<60;i++){const o=document.createElement('option');o.value=i;
    o.textContent=hanjaPillar(i)+' '+hangulPillar(i)+'일';sel.appendChild(o);}})();

function ganjiCell(label,id){
  const ge=EL_NAME[GAN_EL[id%10]], je=EL_NAME[JI_EL[id%12]];
  return '<div class="col"><h3>'+label+'</h3>'
    +'<div class="glyph bg-'+ge+' el-'+ge+'">'+GAN_H[id%10]+'</div>'
    +'<div class="glyph bg-'+je+' el-'+je+'">'+JI_H[id%12]+'</div>'
    +'<div class="kor">'+hangulPillar(id)+'</div></div>';
}
// 날짜 → 간지
function calD2G(){
  const dateStr=document.getElementById('calDate').value;
  const out=document.getElementById('calD2GOut');
  if(!dateStr||dateStr<WEB_DATA.minDate||dateStr>WEB_DATA.maxDate){
    out.innerHTML='<div class="err" style="margin-top:8px">지원 범위(1900~2050)를 벗어났습니다.</div>';return;}
  const [Y,M,D]=dateStr.split('-').map(Number);
  const jdn=toJDN(Y,M,D);
  const dayId=((jdn+WEB_DATA.dayPillarOffset)%60+60)%60;
  const yearId=lookupChange(WEB_DATA.yearChanges,dateStr);
  const monId=lookupChange(WEB_DATA.monthChanges,dateStr);
  const L=lookupLunar(dateStr);
  let h='<div class="meta" style="margin-top:12px">'
    +'<span>양력 <b>'+dateStr+' ('+WD_JDN[((jdn%7)+7)%7]+')</b></span>'
    +'<span>음력 <b>'+L.year+'.'+pad2(L.month)+'.'+pad2(L.day)+(L.leap?' (윤달)':'')+'</b></span>'
    +'<span>띠 <b>'+ANIMAL[yearId%12]+'띠</b></span></div>';
  h+='<div class="pillars" style="grid-template-columns:repeat(3,1fr);max-width:380px;margin:0 auto">'
    +ganjiCell('년주',yearId)+ganjiCell('월주',monId)+ganjiCell('일주',dayId)+'</div>';
  out.innerHTML=h;
}
// 간지 → 날짜 (생일찾기)
function calG2D(){
  const T=+document.getElementById('calGanji').value;
  let fromY=+document.getElementById('calFromY').value, toY=+document.getElementById('calToY').value;
  const out=document.getElementById('calG2DOut');
  if(fromY>toY){const t=fromY;fromY=toY;toY=t;}
  fromY=Math.max(1900,fromY); toY=Math.min(2050,toY);
  const startJDN=toJDN(fromY,1,1), endJDN=toJDN(toY,12,31);
  const off=WEB_DATA.dayPillarOffset;
  let jdn=startJDN+(((T-((startJDN+off)%60))%60+60)%60); // 범위 내 첫 일치일
  const rows=[]; const CAP=500;
  for(;jdn<=endJDN;jdn+=60){
    const g=fromJDN(jdn), ds=dateStrOf(g.year,g.month,g.day), L=lookupLunar(ds);
    rows.push('<tr><td>'+ds+' ('+WD_JDN[((jdn%7)+7)%7]+')</td>'
      +'<td>음 '+L.year+'.'+pad2(L.month)+'.'+pad2(L.day)+(L.leap?' 윤':'')+'</td></tr>');
    if(rows.length>=CAP)break;
  }
  if(!rows.length){out.innerHTML='<div class="note" style="margin-top:8px">해당 기간에 결과가 없습니다.</div>';return;}
  out.innerHTML='<div style="margin-top:10px"><b>'+hanjaPillar(T)+' '+hangulPillar(T)+'일</b> — '
    +fromY+'~'+toY+'년 '+rows.length+'건'+(rows.length>=CAP?' (최대 '+CAP+'건 표시)':'')+'</div>'
    +'<table style="margin-top:6px"><tr><th>양력</th><th>음력</th></tr>'+rows.join('')+'</table>';
}
document.getElementById('calModeSeg').addEventListener('click',e=>{
  if(e.target.tagName!=='BUTTON')return;
  [...e.currentTarget.children].forEach(b=>b.classList.remove('on'));e.target.classList.add('on');
  const m=e.target.dataset.m;
  document.getElementById('calD2G').style.display=(m==='d2g')?'':'none';
  document.getElementById('calG2D').style.display=(m==='g2d')?'':'none';
});
document.getElementById('calGoD2G').addEventListener('click',calD2G);
document.getElementById('calGoG2D').addEventListener('click',calG2D);

// ── 시간 보정 UI 배선 ──
(function(){
  const sel=document.getElementById('citySel');
  for(const [name,lon] of CITIES){const o=document.createElement('option');

function syncCorrUI(){

  const isJin=(mode==='jintaeyang');
  const cs=document.getElementById('citySel');
  document.getElementById('cityField').style.display=isJin?'':'none';
  document.getElementById('lonField').style.display=(isJin&&cs.value==='직접입력')?'':'none';

document.getElementById('corrMode').addEventListener('change',syncCorrUI);
document.getElementById('citySel').addEventListener('change',syncCorrUI);
syncCorrUI();

// ══════════════════════════════════════════
//  입력정보 저장 / 불러오기 (localStorage)
// ══════════════════════════════════════════
const PROFILE_KEY='saju_profiles_v1';
// 현재 입력값 → 객체
function getInputState(){
  const g=document.querySelector('#genderSeg button.on');
  return {
    date:document.getElementById('date').value,
    time:document.getElementById('time').value,
    gender:g?g.dataset.g:'M',
    corrMode:document.getElementById('corrMode').value,
    city:document.getElementById('citySel').value,
    lon:document.getElementById('lonInput').value,
    yaja:document.getElementById('yajaMode').value,
    noTime:document.getElementById('noTime').checked
  };
}
// 객체 → 입력값 반영
function setInputState(s){
  if(!s)return;
  if(s.date)document.getElementById('date').value=s.date;
  if(s.time)document.getElementById('time').value=s.time;
  // 성별 세그 버튼
  [...document.getElementById('genderSeg').children].forEach(b=>{
    b.classList.toggle('on',b.dataset.g===(s.gender||'M'));});
  if(s.corrMode)document.getElementById('corrMode').value=s.corrMode;
  if(s.city)document.getElementById('citySel').value=s.city;
  if(s.lon!=null)document.getElementById('lonInput').value=s.lon;
  if(s.yaja)document.getElementById('yajaMode').value=s.yaja;
  document.getElementById('noTime').checked=!!s.noTime;
  syncCorrUI();
}
// 저장소 읽기/쓰기 (실패해도 앱은 계속 동작)
function loadProfiles(){
  try{return JSON.parse(localStorage.getItem(PROFILE_KEY))||{};}
  catch(e){return {};}
}
function storeProfiles(obj){
  try{localStorage.setItem(PROFILE_KEY,JSON.stringify(obj));return true;}
  catch(e){profileFlash('저장 실패: 브라우저 저장공간을 사용할 수 없습니다.');return false;}
}
function profileFlash(msg){
  const el=document.getElementById('profileMsg');el.textContent=msg;
  if(profileFlash._t)clearTimeout(profileFlash._t);
  profileFlash._t=setTimeout(()=>{el.textContent='';},2500);
}
// 드롭다운 목록 갱신
function refreshProfileList(sel){
  const profs=loadProfiles(),names=Object.keys(profs).sort((a,b)=>a.localeCompare(b,'ko'));
  const dd=document.getElementById('profileSel');
  dd.innerHTML='<option value="">'+(names.length?'— 불러올 입력 선택 —':'— 저장된 입력 없음 —')+'</option>';
  for(const n of names){const o=document.createElement('option');o.value=n;o.textContent=n;dd.appendChild(o);}
  if(sel&&profs[sel])dd.value=sel;
}
// 저장
document.getElementById('btnSaveProfile').addEventListener('click',()=>{
  const nameInput=document.getElementById('profileName');
  let name=(nameInput.value||'').trim();
  if(!name){profileFlash('저장할 이름·메모를 입력하세요.');nameInput.focus();return;}
  const profs=loadProfiles();
  if(profs[name]&&!confirm('"'+name+'" 입력이 이미 있습니다. 덮어쓸까요?'))return;
  profs[name]=getInputState();
  if(storeProfiles(profs)){refreshProfileList(name);profileFlash('"'+name+'" 저장됨.');}
});
// 불러오기 (선택 즉시 적용 + 조회)
document.getElementById('profileSel').addEventListener('change',e=>{
  const name=e.target.value;if(!name)return;
  const profs=loadProfiles();
  if(!profs[name]){profileFlash('입력을 찾을 수 없습니다.');refreshProfileList();return;}
  setInputState(profs[name]);
  document.getElementById('profileName').value=name;
  compute();
  profileFlash('"'+name+'" 불러옴.');
});
// 삭제
document.getElementById('btnDelProfile').addEventListener('click',()=>{
  const dd=document.getElementById('profileSel'),name=dd.value;
  if(!name){profileFlash('삭제할 입력을 목록에서 선택하세요.');return;}
  if(!confirm('"'+name+'" 저장 입력을 삭제할까요?'))return;
  const profs=loadProfiles();delete profs[name];
  if(storeProfiles(profs)){refreshProfileList();profileFlash('"'+name+'" 삭제됨.');}
});
refreshProfileList();

compute();
</script>
